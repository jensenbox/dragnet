{% extends "core/base.html" %}

{% block title %}Log in — Dragnet{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">
    <div class="card mt-5">
      <div class="card-body">
        <h1 class="h4 card-title text-center mb-4">🕸️ Dragnet</h1>
        {% if form.errors %}
        <div class="alert alert-danger">Wrong username or password.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-control" autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
          </div>
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="btn btn-primary w-100">Log in</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
